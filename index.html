<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="可切換山脈、水文、特殊地形與國家公園圖層的北美洲互動式地理教材。" />
  <title>北美地形探險隊</title>
  <link rel="preconnect" href="https://server.arcgisonline.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/style.css?v=20260718-5" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">North America Terrain Explorer</p>
      <h1>北美地形探險隊</h1>
    </div>
    <div class="header-actions">
      <button id="tourBtn" class="btn">開始導覽</button>
      <button id="quizBtn" class="btn btn-primary">隨機挑戰</button>
      <a class="btn" href="docs/specification.md" target="_blank" rel="noopener">規格書</a>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="教材控制區">
      <section>
        <h2>探索主題</h2>
        <p class="hint">預設顯示無道路與國界的衛星地形；可切換教材標註。</p>
        <div id="categoryFilters" class="filter-grid"></div>
      </section>

      <section>
        <label for="searchInput"><strong>搜尋景點</strong></label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="例如：大峽谷、洛磯山脈" />
          <button id="searchBtn" class="icon-btn" aria-label="搜尋">⌕</button>
        </div>
        <div id="searchResults" class="search-results" aria-live="polite"></div>
      </section>

      <section>
        <h2>景點清單</h2>
        <div id="placeList" class="place-list" aria-label="可選取的景點清單"></div>
      </section>

      <section class="lesson-box">
        <h2>觀察任務</h2>
        <p id="missionText">同時開啟「山脈」與「河流」圖層，觀察河流源頭與山地的關係。</p>
        <button id="nextMissionBtn" class="text-btn">換一題 →</button>
      </section>

      <section>
        <h2>圖例</h2>
        <div id="legend" class="legend"></div>
      </section>
    </aside>

    <section class="map-panel">
      <div id="map" role="application" aria-label="北美洲衛星地形與教材標註地圖"></div>
      <div class="map-note">衛星地形底圖不顯示道路或國界；彩色標記與文字為教材標註。</div>
    </section>

    <aside id="infoPanel" class="info-panel" aria-live="polite">
      <div class="empty-state">
        <div class="empty-icon">🧭</div>
        <h2>從清單選擇景點</h2>
        <p>選取山脈、河流、特殊地形或國家公園，查看形成原因、實景與資料來源。</p>
      </div>
    </aside>
  </main>

  <dialog id="quizDialog">
    <form method="dialog" class="quiz-card">
      <button class="dialog-close" value="cancel" aria-label="關閉">×</button>
      <p class="eyebrow">地圖挑戰</p>
      <h2 id="quizQuestion"></h2>
      <div id="quizOptions" class="quiz-options"></div>
      <p id="quizFeedback" class="quiz-feedback"></p>
      <button id="nextQuizBtn" type="button" class="btn btn-primary">下一題</button>
    </form>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js?v=20260718-5" type="module"></script>
</body>
</html>
